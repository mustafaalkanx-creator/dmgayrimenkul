<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesajınız Alındı - DMgayrimenkul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .checkmark-circle {
            animation: scaleIn 0.5s ease-out 0.3s both;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">DMgayrimenkul</a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4">
        <div class="max-w-lg w-full text-center fade-in">
            <div class="bg-white rounded-2xl shadow-lg p-10 md:p-14">
                <div class="checkmark-circle w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-8">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>

                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">
                    Mesajiniz Alindi!
                </h1>

                <p class="text-gray-600 text-lg leading-relaxed mb-8">
                    Talebiniz basariyla iletildi. En kisa surede sizinle iletisime gececegiz.
                </p>

                <a href="/"
                   class="inline-block bg-blue-600 text-white px-8 py-4 rounded-lg font-semibold text-lg hover:bg-blue-700 transition">
                    Ana Sayfaya Don
                </a>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-500 text-sm">
                &copy; 2024 DMgayrimenkul. Tum haklari saklidir.
            </p>
        </div>
    </footer>

</body>
</html>
