<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Talebiniz başarıyla alındı. DMgayrimenkul ekibi en kısa sürede sizinle iletişime geçecektir.">
    <title>Teşekkürler - DMgayrimenkul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .checkmark-circle {
            animation: scaleIn 0.5s ease-out 0.3s both;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-gray-100 min-h-screen flex flex-col">

    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">DMgayrimenkul</a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="max-w-lg w-full text-center fade-in">
            <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12">

                <div class="checkmark-circle w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-8">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>

                <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-4">
                    Teşekkürler!
                </h1>

                <p class="text-gray-600 text-lg mb-8 leading-relaxed">
                    Bilgileriniz başarıyla tarafımıza ulaştı. En kısa sürede sizinle iletişime geçeceğiz.
                </p>

                <a href="/"
                   class="inline-block w-full bg-blue-600 text-white py-4 px-6 rounded-lg font-semibold text-lg hover:bg-blue-700 transition duration-200 shadow-md hover:shadow-lg">
                    Ana Sayfaya Dön
                </a>

                <div class="pt-6 mt-8 border-t border-gray-200">
                    <p class="text-sm text-gray-500 mb-2">
                        Sorularınız için bize ulaşabilirsiniz
                    </p>
                    <p class="text-blue-600 font-semibold">
                        DMgayrimenkul
                    </p>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-500 text-sm">
                &copy; 2024 DMgayrimenkul. Tüm hakları saklıdır.
            </p>
        </div>
    </footer>

</body>
</html>
